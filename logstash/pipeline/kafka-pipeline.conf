input {
    kafka {
        bootstrap_servers => "kafka:29092"
        topics => ["velib-data"]
        codec => json
        consumer_threads => 1
        decorate_events => true
        auto_offset_reset => "earliest"
        group_id => "logstash-velib-consumer"
    }
}

filter {
    # Convertir les indicateurs 0/1 en booléens pour respecter le mapping ES.
    ruby {
        code => "
            ['is_installed', 'is_renting', 'is_returning'].each do |field|
                value = event.get(field)
                next if value.nil?

                bool_value =
                    case value
                    when true, false
                        value
                    when Integer
                        value != 0
                    when Float
                        value != 0.0
                    else
                        v = value.to_s.strip.downcase
                        ['1', 'true', 't', 'yes', 'y'].include?(v)
                    end

                event.set(field, bool_value)
            end
        "
    }

    # Convertir last_reported (timestamp Unix) en date
    if [last_reported] {
        date {
            match => [ "last_reported", "UNIX" ]
            target => "last_reported_date"
        }
    }
    
    # Parser collected_at en timestamp
    date {
        match => [ "collected_at", "ISO8601" ]
        target => "@timestamp"
    }
    
    # Créer un point géographique pour Kibana Maps
    if [latitude] and [longitude] {
        mutate {
            add_field => {
                "[location][lat]" => "%{latitude}"
                "[location][lon]" => "%{longitude}"
            }
        }
        
        mutate {
            convert => {
                "[location][lat]" => "float"
                "[location][lon]" => "float"
            }
        }
    }
    
    # Calculer le statut de la station
    ruby {
        code => "
            num_bikes = event.get('num_bikes_available') || 0
            num_docks = event.get('num_docks_available') || 0
            capacity = event.get('capacity') || 0
            
            if capacity > 0
                if num_bikes == 0
                    event.set('station_status', 'empty')
                elsif num_docks == 0
                    event.set('station_status', 'full')
                elsif num_bikes < capacity * 0.2
                    event.set('station_status', 'low')
                elsif num_docks < capacity * 0.2
                    event.set('station_status', 'almost_full')
                else
                    event.set('station_status', 'available')
                end
            else
                event.set('station_status', 'unknown')
            end
        "
    }
    
    # Ajouter heure de la journée pour analyses
    ruby {
        code => "
            event.set('hour_of_day', Time.now.hour)
            
            hour = Time.now.hour
            if hour >= 6 && hour < 12
                event.set('time_period', 'morning')
            elsif hour >= 12 && hour < 14
                event.set('time_period', 'lunch')
            elsif hour >= 14 && hour < 19
                event.set('time_period', 'afternoon')
            elsif hour >= 19 && hour < 22
                event.set('time_period', 'evening')
            else
                event.set('time_period', 'night')
            end
        "
    }
    
    # Catégoriser par arrondissement (basé sur le nom de la station)
    if [name] =~ /\d{5}/ {
        grok {
            match => { "name" => "%{NUMBER:arrondissement:int}" }
        }
    }
    
    # Ajouter des métadonnées
    mutate {
        add_field => { 
            "pipeline" => "velib-kafka-elasticsearch"
            "data_type" => "bike_sharing"
        }
    }
    
    # Nettoyer les champs inutiles
    mutate {
        remove_field => [ "[@metadata][kafka]", "event", "host" ]
    }
}

output {
    elasticsearch {
        hosts => ["elasticsearch:9200"]
        user => "logstash_internal"
        password => "${LOGSTASH_INTERNAL_PASSWORD}"
        index => "velib-data-%{+YYYY.MM.dd}"
        
        # Auto-création avec mapping dynamique
        manage_template => true
        template_name => "velib-data"
        template_overwrite => true
    }
    
    # Debug - garder pour développement
    stdout {
        codec => rubydebug {
            metadata => false
        }
    }
}
